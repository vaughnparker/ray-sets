<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The 16 twisty-puzzle ray-sets</title>
<style>
  :root{
    --bg:#f5f4ef; --panel:#ffffff; --ink:#2c2c2a; --muted:#6b6a64;
    --line:#dcdad2; --hi:#e9e7df; --accent:#534ab7;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink)}
  #app{display:flex;height:100vh;overflow:hidden}
  #sidebar{width:260px;flex:none;border-right:1px solid var(--line);background:var(--panel);overflow-y:auto;padding:14px 0}
  #sidebar h1{font-size:15px;font-weight:600;margin:6px 16px 2px}
  #sidebar .sub{font-size:12px;color:var(--muted);margin:0 16px 12px;line-height:1.5}
  .grp{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:14px 16px 6px;font-weight:600}
  .item{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-size:13px;color:var(--ink)}
  .item:hover{background:var(--hi)}
  .item.active{background:var(--accent);color:#fff}
  .item .n{font-variant-numeric:tabular-nums;font-weight:600;min-width:26px}
  .item .p{color:var(--muted);font-size:12px}
  .item.active .p{color:#e5e3f7}
  #stage{flex:1;position:relative;min-width:0}
  #canvas-wrap{position:absolute;inset:0}
  #hud{position:absolute;left:18px;top:16px;pointer-events:none}
  #hud .title{font-size:20px;font-weight:600}
  #hud .meta{font-size:13px;color:var(--muted);margin-top:2px}
  #legend{position:absolute;left:18px;bottom:16px;background:rgba(255,255,255,.86);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:12px;backdrop-filter:blur(4px)}
  #legend .row{display:flex;align-items:center;gap:8px;margin:3px 0}
  #legend .sw{width:12px;height:12px;border-radius:3px;flex:none}
  #hint{position:absolute;right:16px;bottom:16px;font-size:12px;color:var(--muted)}
  @media (max-width:640px){#sidebar{width:200px}}
</style>
</head>

function addOrbitControls(){
  const el = renderer.domElement;
  el.addEventListener('pointerdown', e=>{dragging=true;px=e.clientX;py=e.clientY;el.setPointerCapture(e.pointerId);});
  el.addEventListener('pointerup', e=>{dragging=false;});
  el.addEventListener('pointermove', e=>{
    if(!dragging) return;
    rotY += (e.clientX-px)*0.008;
    rotX += (e.clientY-py)*0.008;
    rotX = Math.max(-1.4, Math.min(1.4, rotX));
    px=e.clientX; py=e.clientY;
  });
  el.addEventListener('wheel', e=>{e.preventDefault(); dist*=(1+Math.sign(e.deltaY)*0.08); dist=Math.max(3,Math.min(14,dist));}, {passive:false});
}
function animate(){
  raf=requestAnimationFrame(animate);
  const cx=Math.cos(rotX), sx=Math.sin(rotX), cy=Math.cos(rotY), sy=Math.sin(rotY);
  camera.position.set(dist*cx*sy, dist*sx, dist*cx*cy);
  camera.lookAt(0,0,0);
  renderer.render(scene,camera);
}

function clearGroup(){ if(group){scene.remove(group); group.traverse(o=>{if(o.geometry)o.geometry.dispose();if(o.material)o.material.dispose();});} group=new THREE.Group(); scene.add(group);}

function addWireframe(edges){
  const mat = new THREE.LineBasicMaterial({color:0xb4b2a9, transparent:true, opacity:.65});
  const g = new THREE.BufferGeometry();
  const pts=[];
  edges.forEach(e=>{ pts.push(...e[0], ...e[1]); });
  g.setAttribute('position', new THREE.Float32BufferAttribute(pts,3));
  group.add(new THREE.LineSegments(g, mat));
}

function addArrow(dir, color){
  const R=1.6;
  const end = new THREE.Vector3(dir[0],dir[1],dir[2]).normalize().multiplyScalar(R);
  // shaft
  const shaftMat = new THREE.LineBasicMaterial({color});
  const g = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), end.clone().multiplyScalar(0.86)]);
  group.add(new THREE.Line(g, shaftMat));
  // cone head
  const cone = new THREE.Mesh(new THREE.ConeGeometry(0.055, 0.18, 12),
                              new THREE.MeshBasicMaterial({color}));
  cone.position.copy(end.clone().multiplyScalar(0.92));
  cone.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), end.clone().normalize());
  group.add(cone);
  // tip dot
  const dot = new THREE.Mesh(new THREE.SphereGeometry(0.045,10,10), new THREE.MeshBasicMaterial({color}));
  dot.position.copy(end); group.add(dot);
}

function render(set){
  clearGroup();
  addWireframe(DATA.wire[set.wireframe]);
  set.arrows.forEach(a=> addArrow(a.dir, COL[a.kind]));
  document.getElementById('t-title').textContent = set.id;
  const kinds = {};
  set.arrows.forEach(a=> kinds[a.kind]=(kinds[a.kind]||0)+1);
  const parts = Object.entries(kinds).map(([k,n])=>`${n} ${KIND_LABEL[k]}`);
  document.getElementById('t-meta').textContent = `${set.count} rays · ${set.puzzle} · ${parts.join(' + ')}`;
  // legend
  const leg = document.getElementById('legend');
  leg.innerHTML='';
  Object.keys(kinds).forEach(k=>{
    const row=document.createElement('div'); row.className='row';
    row.innerHTML=`<span class="sw" style="background:#${COL[k].toString(16).padStart(6,'0')}"></span>${KIND_LABEL[k]} (${kinds[k]})`;
    leg.appendChild(row);
  });
}

function buildList(){
  const list=document.getElementById('list');
  const fams=[['O','Octahedral (cube / octahedron)'],['I','Icosahedral (dodeca / icosa)'],['T','Tetrahedral']];
  fams.forEach(([f,label])=>{
    const h=document.createElement('div'); h.className='grp'; h.textContent=label; list.appendChild(h);
    DATA.sets.filter(s=>s.family===f).forEach(s=>{
      const b=document.createElement('button'); b.className='item'; b.dataset.id=s.id;
      b.innerHTML=`<span class="n">${s.count}</span><span>rays</span><span class="p">${s.puzzle}</span>`;
      b.onclick=()=>{ document.querySelectorAll('.item').forEach(x=>x.classList.remove('active')); b.classList.add('active'); render(s); };
      list.appendChild(b);
    });
  });
}

window.addEventListener('resize', ()=>{
  const w=wrap.clientWidth,h=wrap.clientHeight;
  camera.aspect=w/h; camera.updateProjectionMatrix(); renderer.setSize(w,h);
});

initThree();
buildList();
const first=document.querySelector('.item'); first.classList.add('active'); render(DATA.sets[0]);
</script>
